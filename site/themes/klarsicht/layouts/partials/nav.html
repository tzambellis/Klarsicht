<nav class="site-nav">
  <div class="wrap">
    <a href="/site/" class="logo"><span class="mark">K</span> Klarsicht</a>
    <button class="burger" onclick="document.querySelector('.site-nav .links').classList.toggle('open')" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="links">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" onclick="this.parentElement.classList.remove('open')"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </div>
  </div>
</nav>
