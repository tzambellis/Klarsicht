apiVersion: v1
kind: Secret
metadata:
  name: {{ include "klarsicht.fullname" . }}-dashboard-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klarsicht.dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  .htpasswd: {{ .Values.dashboard.auth.htpasswd | default "admin:$apr1$bGGuIyMP$UXlOrOYGWAKS7ezw5Ia9b0" | quote }}
