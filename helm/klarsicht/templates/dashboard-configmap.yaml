apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "klarsicht.fullname" . }}-dashboard-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klarsicht.dashboard.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # Landing page at root
        location = / {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-landing.{{ .Release.Namespace }}.svc:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Landing page favicon
        location = /favicon.svg {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-landing.{{ .Release.Namespace }}.svc:80/favicon.svg;
            proxy_set_header Host $host;
        }

        # Dashboard app under /app/ (basic auth)
        location /app/ {
            auth_basic "Klarsicht Dashboard";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /app/index.html;
        }

        # Webhook endpoint — open for Grafana (no auth)
        location = /api/alert {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-agent.{{ .Release.Namespace }}.svc:8000/alert;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — protected (dashboard calls it)
        location /api/ {
            auth_basic "Klarsicht";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;

            proxy_pass http://{{ include "klarsicht.fullname" . }}-agent.{{ .Release.Namespace }}.svc:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Docs & Blog (Hugo)
        location /docs/ {
            proxy_pass http://klarsicht-site.{{ .Release.Namespace }}.svc:80/docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /blog/ {
            proxy_pass http://klarsicht-site.{{ .Release.Namespace }}.svc:80/blog/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Hugo static assets (css)
        location /css/ {
            proxy_pass http://klarsicht-site.{{ .Release.Namespace }}.svc:80/css/;
            proxy_set_header Host $host;
        }

        # Health check
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
