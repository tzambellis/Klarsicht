apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "klarsicht.fullname" . }}-dashboard-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klarsicht.dashboard.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # API reverse proxy to agent service (strip /api prefix)
        location /api/ {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-agent.{{ .Release.Namespace }}.svc:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Landing page
        location /landingpage {
            proxy_pass http://{{ include "klarsicht.fullname" . }}-landing.{{ .Release.Namespace }}.svc:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Docs & Blog (Hugo site) — keep /site/ prefix
        location /site/ {
            proxy_pass http://klarsicht-site.{{ .Release.Namespace }}.svc:80/site/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # React SPA client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
