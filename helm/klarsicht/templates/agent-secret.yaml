apiVersion: v1
kind: Secret
metadata:
  name: {{ include "klarsicht.agent.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "klarsicht.agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  llm-api-key: {{ .Values.agent.llmApiKey | quote }}
  webhook-secret: {{ .Values.grafana.webhookSecret | quote }}
  {{- if .Values.postgres.enabled }}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "klarsicht.agent.secretName" .)) }}
  {{- $existingPgPass := "" }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "postgres-password") }}
  {{- $existingPgPass = index $existingSecret.data "postgres-password" | b64dec }}
  {{- end }}
  postgres-password: {{ .Values.postgres.password | default $existingPgPass | default (randAlphaNum 24) | quote }}
  {{- end }}
  {{- if .Values.slack.webhookUrl }}
  slack-webhook-url: {{ .Values.slack.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.gitlab.enabled }}
  gitlab-token: {{ .Values.gitlab.token | quote }}
  {{- end }}
  {{- if .Values.teams.webhookUrl }}
  teams-webhook-url: {{ .Values.teams.webhookUrl | quote }}
  {{- end }}
